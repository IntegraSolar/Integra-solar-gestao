version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    groups:
      # Patch updates agrupados — merge automático seguro
      patch-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "tailwindcss"
          - "eslint"
          - "typescript"
      # Supabase atualizado junto
      supabase:
        patterns:
          - "@supabase/*"
      # Sentry atualizado junto
      sentry:
        patterns:
          - "@sentry/*"
      # Stripe atualizado junto
      stripe:
        patterns:
          - "stripe"
          - "@stripe/*"
    # Major versions sempre requerem revisão manual
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
