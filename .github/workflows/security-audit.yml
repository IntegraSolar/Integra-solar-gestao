name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - "web/package.json"
      - "web/package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "web/package.json"
      - "web/package-lock.json"
  schedule:
    # Roda toda segunda-feira às 09h (Brasília = UTC-3)
    - cron: "0 12 * * 1"

jobs:
  audit:
    name: npm audit (High/Critical gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run security audit (bloqueia em High/Critical)
        run: npm audit --audit-level=high

      - name: Run TypeScript check
        run: npx tsc --noEmit
